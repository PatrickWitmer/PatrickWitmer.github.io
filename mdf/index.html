<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDF 2026</title>
    <style>
        :root {
            --bg: #000000;
            --bg-secondary: #0d0d0d;
            --text: #b8b8b8;
            --text-bright: #e8e8e8;
            --accent: #ff0000;
            --border: #333;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            border: 8px solid var(--border);
        }

        h1 {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 1.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 2.5rem;
            border-bottom: 4px solid var(--accent);
            padding-bottom: 0.5rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            flex: 1;
        }

        .clear-btn {
            background: var(--accent);
            color: var(--bg);
            border: 2px solid var(--accent);
            padding: 0.5rem 1.5rem;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.1s;
            text-decoration: none;
            display: inline-block;
        }

        .clear-btn:hover {
            background: var(--bg);
            color: var(--accent);
        }

        input, select {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            color: var(--text-bright);
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .filters:has(input:not(:placeholder-shown)) input,
        .filters:has(select:not([value=""])) select {
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--text);
            text-transform: uppercase;
        }

        .key {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .key span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .key .symbol {
            color: var(--accent);
            font-size: 1.1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid var(--border);
        }

        th {
            text-align: left;
            background: var(--bg-secondary);
            border-bottom: 4px solid var(--accent);
            padding: 1rem 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.75rem;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            color: var(--accent);
        }

        th.sorted-asc::after {
            content: " ▲";
        }

        th.sorted-desc::after {
            content: " ▼";
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        tr:hover td {
            background: var(--bg-secondary);
            color: var(--text-bright);
        }

        tr.must-see td {
            background: rgba(255, 0, 0, 0.15);
            border-left: 3px solid var(--accent);
        }

        tr.must-see td:first-child {
            color: var(--accent);
        }

        tr.must-see:hover td {
            background: rgba(255, 0, 0, 0.25);
        }

        tr td:first-child {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .rating {
            color: var(--accent);
            letter-spacing: 0.3em;
            font-size: 1rem;
        }

        .empty {
            color: var(--text);
            text-align: center;
            padding: 3rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .count {
            margin-bottom: 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text);
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="filters">
            <input type="text" id="search" placeholder="Search...">
            <select id="day">

            <select id="stage">

                <option value="Nevermore Hall">Nevermore Hall</option>
                <option value="Angel's Rock Bar">Angel's Rock Bar</option>
            </select>
            <select id="genre">

                <option value="death">Death</option>
                <option value="black">Black</option>
                <option value="doom">Doom</option>
                <option value="thrash">Thrash</option>
            </select>
        </div>
        <a href="#" class="clear-btn" onclick="resetFilters(); return false;">Reset</a>
    </div>

    <div class="key">
        <span><span class="symbol">⛧⛧</span> Must See</span>
        <span><span class="symbol">⛧</span> Recommended</span>
        <span><span class="symbol">✧</span> Worth Seeing</span>
        <span><span class="symbol">·</span> Skip</span>
    </div>

    <div class="count" id="count"></div>

                <th data-sort="location">Location</th>
                <th data-sort="must_see">Rating</th>

        </thead>
        <tbody id="results"></tbody>
    </table>

        function fuzzyMatch(query, text) {
            if (!query || !text) return false;
            const q = query.toLowerCase().replace(/[^a-z0-9]/g, '');
            const t = text.toLowerCase().replace(/[^a-z0-9]/g, '');
            return t.includes(q);
        }

        function filterBands() {
            const q = document.getElementById('search').value;
            const day = document.getElementById('day').value;
            const stage = document.getElementById('stage').value;
            const genre = document.getElementById('genre').value;

            return bandsData.filter(band => {
                if (day && !fuzzyMatch(day, band.day)) return false;
                if (stage && !fuzzyMatch(stage, band.stage)) return false;
                if (genre && !fuzzyMatch(genre, band.genre)) return false;
                if (q) {
                    const searchable = [band.band, band.genre, band.notes || '', band.location || '', band.stage || '', band.day || ''].join(' ');
                    if (!fuzzyMatch(q, searchable)) return false;
                }
                return true;
            });
        }

        function sortBands(data) {
            return [...data].sort((a, b) => {
                const av = a[sortCol] || '';
                const bv = b[sortCol] || '';
                const cmp = av.toLowerCase().localeCompare(bv.toLowerCase());
                return sortAsc ? cmp : -cmp;
            });
        }

        function render() {
            const filtered = sortBands(filterBands());
            const tbody = document.getElementById('results');
            document.getElementById('count').textContent = `Showing ${filtered.length} of ${bandsData.length} bands`;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty">No bands found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(band => {
                let rating = '·';
                if (band.must_see === '0') rating = '⛧⛧';
                else if (band.must_see === '1') rating = '⛧';
                else if (band.must_see === '2') rating = '✧';
                
                const rowClass = band.must_see === '0' ? 'must-see' : '';
                return `<tr class="${rowClass}">
                    <td>${band.band}</td>
                    <td>${band.day}</td>
                    <td>${band.stage}</td>
                    <td>${band.genre}</td>
                    <td>${band.location}</td>
                    <td class="rating">${rating}</td>
                </tr>`;
            }).join('');

            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.classList.remove('sorted-asc', 'sorted-desc');
                if (th.dataset.sort === sortCol) {
                    th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
                }
            });
        }

        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.sort;
                if (sortCol === col) {
                    sortAsc = !sortAsc;
                } else {
                    sortCol = col;
                    sortAsc = true;
                }
                render();
            });
        });

        function resetFilters() {
            document.getElementById('search').value = '';
            document.getElementById('day').value = '';
            document.getElementById('stage').value = '';
            document.getElementById('genre').value = '';
            sortCol = 'band';
            sortAsc = true;
            render();
        }

        document.getElementById('search').addEventListener('input', render);
        document.getElementById('day').addEventListener('change', render);
        document.getElementById('stage').addEventListener('change', render);
        document.getElementById('genre').addEventListener('change', render);

        render();
    </script>
