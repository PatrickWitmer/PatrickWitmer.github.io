    <style>
        :root {
            --bg: #0a0a0a;
            --bg-secondary: #111;
            --text: #e0e0e0;
            --text-dim: #666;
            --accent: #a8d8ea;
            --border: #333;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        h1 {
            color: var(--accent);
            font-weight: normal;
            margin-bottom: 2rem;
            letter-spacing: 0.2em;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        input, select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            font-family: inherit;
            font-size: 0.9rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--text-dim);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0.5rem;
            font-weight: normal;
            letter-spacing: 0.1em;
        }

        td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td {
            background: var(--bg-secondary);
        }

        .rating {
            color: var(--accent);
            letter-spacing: 0.2em;
        }

        .empty {
            color: var(--text-dim);
            text-align: center;
            padding: 3rem;
        }
    </style>
</head>

        const searchInput = document.getElementById('searchInput');
        const daySelect = document.getElementById('daySelect');
        const stageSelect = document.getElementById('stageSelect');
        const genreSelect = document.getElementById('genreSelect');
        const results = document.getElementById('results');

        function formatRating(value) {
            if (value === "0") return "⛧⛧";
            if (value === "1") return "⛧";
            if (value === "2") return "✧";
            if (value === "3") return "·";
            return "";
        }

        function filterBands() {
            const q = searchInput.value.toLowerCase();
            const day = daySelect.value;
            const stage = stageSelect.value;
            const genre = genreSelect.value.toLowerCase();

            return bandsData.filter(band => {
                if (day && band.day !== day) return false;
                if (stage && band.stage !== stage) return false;
                if (genre && !band.genre.toLowerCase().includes(genre)) return false;
                if (q) {
                    const searchable = `${band.band} ${band.genre} ${band.notes}`.toLowerCase();
                    if (!searchable.includes(q)) return false;
                }
                return true;
            });
        }

        function render() {
            const filtered = filterBands();
            
            if (filtered.length === 0) {
                results.innerHTML = '<tr><td colspan="6" class="empty">No bands found</td></tr>';
                return;
            }

            results.innerHTML = filtered.map(band => `
                <tr>
                    <td>${band.band}</td>
                    <td>${band.day}</td>
                    <td>${band.stage}</td>
                    <td>${band.genre}</td>
                    <td>${band.location}</td>
                    <td class="rating">${formatRating(band.must_see)}</td>
                </tr>
            `).join('');
        }

        // Populate dropdowns
        days.forEach(day => {
            const opt = document.createElement('option');
            opt.value = day;
            opt.textContent = day;
            daySelect.appendChild(opt);
        });

        stages.forEach(stage => {
            const opt = document.createElement('option');
            opt.value = stage;
            opt.textContent = stage;
            stageSelect.appendChild(opt);
        });

        // Event listeners
        searchInput.addEventListener('input', render);
        daySelect.addEventListener('change', render);
        stageSelect.addEventListener('change', render);
        genreSelect.addEventListener('change', render);

        // Initial render
        render();
